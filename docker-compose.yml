name: synergo

services:
  ollama:
    image: ollama/ollama:0.4.2
    container_name: synergo-ollama
    restart: unless-stopped
    environment:
      OLLAMA_KEEP_ALIVE: "30m"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - synergo-net
    # Geen host-poort: Ollama is alleen bereikbaar binnen het docker network.

  webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: synergo-webui
    restart: unless-stopped
    depends_on:
      - ollama
    environment:
      OLLAMA_BASE_URL: "http://ollama:11434"
      WEBUI_AUTH: "True"
      ENABLE_SIGNUP: "True"
      DEFAULT_USER_ROLE: "pending"
      # Geen telemetrie, geen calls naar buiten.
      ANONYMIZED_TELEMETRY: "False"
      SCARF_NO_ANALYTICS: "true"
      DO_NOT_TRACK: "true"
      ENABLE_VERSION_UPDATE_CHECK: "False"
      ENABLE_COMMUNITY_SHARING: "False"
      ENABLE_OPENAI_API: "False"
    volumes:
      - webui_data:/app/backend/data
    networks:
      - synergo-net
    security_opt:
      - no-new-privileges:true
    ports:
      # Bindt standaard alleen op loopback (alleen jouw machine).
      # Voor delen via Tailscale: zet UI_BIND in .env op je Tailscale-IP.
      - "${UI_BIND:-127.0.0.1}:${UI_PORT:-3000}:8080"

networks:
  synergo-net:
    driver: bridge

volumes:
  ollama_data:
  webui_data:
